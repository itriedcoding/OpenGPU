  #     - POSTGRES_DB=opengpu
  #     - POSTGRES_USER=postgres
  #     - POSTGRES_PASSWORD=postgres
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - opengpu-network

  # ============================================
  # Redis (Optional - uncomment to use)
  # ============================================
  # redis:
  #   image: redis:7-alpine
  #   container_name: opengpu-redis
  #   ports:
  #     - "6379:6379"
