name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'

permissions:
  contents: write

jobs:
  # ============================================
  # Version Extraction
  # ============================================
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

  # ============================================
  # Build CLI Binaries
  # ============================================
  build-cli:
    name: Build CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: arm64
          - os: macos-latest
            platform: darwin
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI package
        run: npm run build --workspace=@opengpu/cli

      - name: Package CLI binary
        uses: ./.github/actions/package-cli
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          version: ${{ needs.version.outputs.version }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/opengpu*
          retention-days: 7

  # ============================================
  # Build Desktop Apps
  # ============================================
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: darwin
          - os: windows-latest
            platform: win32

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        run: npm run build --workspace=@opengpu/desktop

      - name: Package desktop app
        uses: ./.github/actions/package-desktop
        with:
          platform: ${{ matrix.platform }}
          version: ${{ needs.version.outputs.version }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: dist/desktop/*
          retention-days: 7

  # ============================================
  # Create GitHub Release
  # ============================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, build-cli, build-desktop]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f | head -50

      - name: Create release notes
        id: notes
        run: |
          # Get commit messages since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          
          # Write release notes
          cat > release_notes.md << EOF
          ## Changes
          
          ${COMMITS}
          
          ## Installation
          
          ### CLI
          \`\`\`bash
          npm install -g @opengpu/cli@${{ needs.version.outputs.version }}
          \`\`\`
          
          ### Desktop
          Download the appropriate installer for your platform from the assets below.
          
          ## Docker
          \`\`\`bash
          docker pull opengpu/api:${{ needs.version.outputs.tag }}
          docker pull opengpu/agent:${{ needs.version.outputs.tag }}
          \`\`\`
          
          ## What's Changed
          
          For a detailed changelog, see the [commit history](https://github.com/opengpu/opengpu/commits/${{ needs.version.outputs.tag }}).
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: OpenGPU ${{ needs.version.outputs.tag }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(needs.version.outputs.version, '-') }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify release
        run: |
          echo "Release ${{ needs.version.outputs.tag }} created successfully!"
          echo "Download URLs:"
          find artifacts/ -type f -name "*.zip" -o -name "*.tar.gz" -o -name "*.exe" -o -name "*.dmg" | while read f; do
            echo "  - $f"
          done
